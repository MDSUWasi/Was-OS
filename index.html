<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Was-Operating System</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="top-panel">
        <div class="panel-left">
            <button id="start-btn"><span>☰</span><span class="btn-text">Start</span></button>
            <button id="activities-btn">🔍</button>
        </div>
        <div class="panel-right">
            <div id="clock">00:00</div>
            <div id="calendar">Jan 01</div>
            <button id="settings-btn">⚙️</button>
            <button id="power-btn">⏻</button>
        </div>
    </div>

    <div id="start-menu" class="hidden">
        <div class="start-header"><h3>Applications</h3></div>
        <div id="start-app-list"></div>
        <div class="start-footer">
            <button id="show-all-btn">All Apps</button>
            <button id="shutdown-btn">Shutdown</button>
        </div>
    </div>

    <div id="custom-app-source" class="hidden"></div>
    <div id="desktop-workspace"></div>
    <div id="taskbar"><div id="taskbar-items"></div></div>
    <div id="notification-area"></div>
    <div id="activities-overlay" class="hidden">
        <input type="text" id="search-input" placeholder="Search apps, files...">
    </div>
    <div id="confirm-dialog" class="modal hidden">
        <div class="modal-content">
            <h3 id="confirm-title">Confirm</h3>
            <p id="confirm-message"></p>
            <div class="modal-buttons">
                <button id="confirm-yes">Yes</button>
                <button id="confirm-no" class="cancel">No</button>
            </div>
        </div>
    </div>
    <div id="custom-app-source" class="hidden">
    <div class="external-app"
         data-id="my-html-app"
         data-title="Was-OS Calendar"
         data-icon="🧩"
         data-src="js/apps/calendar/index.html"
         data-description="My folder-based web app"
         data-category="custom">
    </div>
</div>
    <div id="custom-app-source" class="hidden">
    <div class="external-app"
         data-id="my-html-app"
         data-title="Was-OS To-Do List"
         data-icon="🧩"
         data-src="js/apps/todolist/index.html"
         data-description="My folder-based web app"
         data-category="custom">
    </div>

    <script src="js/core/vfs.js"></script>
    <script src="js/core/os.js"></script>
    <script src="js/core/wm.js"></script>
    <script src="js/utils/notifier.js"></script>
    <script src="js/apps/calculator.js"></script>
    <script src="js/apps/terminal.js"></script>
    <script src="js/apps/notepad.js"></script>
    <script src="js/apps/filemanager.js"></script>
    <script src="js/apps/settings.js"></script>
    <script src="js/apps/notes.js"></script>
    <script src="js/apps/spreadsheet.js"></script>
    <script src="js/apps/browser.js"></script>
    <script src="js/apps/paint.js"></script>
    <script src="js/apps/games.js"></script>
    <script src="js/apps/viewer.js"></script>
    <script src="js/apps/external-apps.js"></script>
    <script src="js/apps/about.js"></script>
    <script src="js/init.js"></script>




</body>
</html>
