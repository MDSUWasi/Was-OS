<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FocusFlow - Advanced To-Do List for Students">
    <title>Was To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-normal">
    <div id="app" class="app-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">✓</span>
                    <h1>Power To-Do</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-filter="all">
                    <span class="nav-icon">📋</span>
                    <span>All Tasks</span>
                    <span class="badge" id="count-all">0</span>
                </button>
                <button class="nav-item" data-filter="today">
                    <span class="nav-icon">📅</span>
                    <span>Today</span>
                    <span class="badge" id="count-today">0</span>
                </button>
                <button class="nav-item" data-filter="upcoming">
                    <span class="nav-icon">🗓️</span>
                    <span>Upcoming</span>
                    <span class="badge" id="count-upcoming">0</span>
                </button>
                <button class="nav-item" data-filter="completed">
                    <span class="nav-icon">✅</span>
                    <span>Completed</span>
                    <span class="badge" id="count-completed">0</span>
                </button>
                <button class="nav-item" data-filter="urgent">
                    <span class="nav-icon">🔥</span>
                    <span>Urgent</span>
                    <span class="badge" id="count-urgent">0</span>
                </button>
            </nav>

            <div class="sidebar-section">
                <h3>Categories</h3>
                <div class="category-list">
                    <button class="category-btn active" data-category="all">All</button>
                    <button class="category-btn" data-category="study">📚 Study</button>
                    <button class="category-btn" data-category="exam">🎓 Exam</button>
                    <button class="category-btn" data-category="assignment">📝 Assignment</button>
                    <button class="category-btn" data-category="personal">👤 Personal</button>
                    <button class="category-btn" data-category="health">💪 Health</button>
                </div>
            </div>

            <div class="sidebar-stats">
                <h3>Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-text">
                    <span id="completed-count">0</span> / <span id="total-count">0</span> Tasks
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                    <span>🌙</span>
                </button>
                <button id="export-btn" class="icon-btn" title="Export Data">
                    <span>📤</span>
                </button>
                <button id="clear-completed" class="icon-btn danger" title="Clear Completed">
                    <span>🗑️</span>
                </button>
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search tasks...">
                    <span class="search-icon">🔍</span>
                </div>

                <div class="view-controls">
                    <button class="view-btn active" data-view="list">📋 List</button>
                    <button class="view-btn" data-view="kanban">📊 Board</button>
                    <button class="view-btn" data-view="timeline">⏰ Timeline</button>
                </div>

                <button id="add-task-btn" class="primary-btn">
                    <span>+</span>
                    <span>New Task</span>
                </button>
            </header>
            <section id="list-view" class="task-view active">
                <div class="task-list-header">
                    <span class="sort-label">Sort by:</span>
                    <select id="sort-select">
                        <option value="created">Date Created</option>
                        <option value="due">Due Date</option>
                        <option value="priority">Priority</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>
                <div id="task-list" class="task-list">
                </div>
            </section>

            <section id="kanban-view" class="task-view">
                <div class="kanban-board">
                    <div class="kanban-column" data-status="todo">
                        <div class="column-header">
                            <h3>📌 To Do</h3>
                            <span class="column-count" id="count-todo">0</span>
                        </div>
                        <div class="column-tasks" id="tasks-todo"></div>
                    </div>
                    <div class="kanban-column" data-status="in-progress">
                        <div class="column-header">
                            <h3>🔄 In Progress</h3>
                            <span class="column-count" id="count-in-progress">0</span>
                        </div>
                        <div class="column-tasks" id="tasks-in-progress"></div>
                    </div>
                    <div class="kanban-column" data-status="done">
                        <div class="column-header">
                            <h3>✅ Done</h3>
                            <span class="column-count" id="count-done">0</span>
                        </div>
                        <div class="column-tasks" id="tasks-done"></div>
                    </div>
                </div>
            </section>

            <section id="timeline-view" class="task-view">
                <div id="timeline-container" class="timeline-container">
                </div>
            </section>
            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <h2>No tasks found</h2>
                <p>Create your first task to get started!</p>
                <button id="empty-add-btn" class="primary-btn">Create Task</button>
            </div>
        </main>
    </div>

    <dialog id="task-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Task</h2>
                <button id="modal-close" class="close-btn">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                
                <div class="form-group">
                    <label for="task-title">Task Title *</label>
                    <input type="text" id="task-title" required placeholder="e.g., Physics Chapter 5 Revision">
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="study">📚 Study</option>
                            <option value="exam">🎓 Exam</option>
                            <option value="assignment">📝 Assignment</option>
                            <option value="personal">👤 Personal</option>
                            <option value="health">💪 Health</option>
                        </select>
                    </div>
                    <div class="form-group half">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">🔥 Urgent</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="task-due">Due Date</label>
                        <input type="date" id="task-due">
                    </div>
                    <div class="form-group half">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="todo">To Do</option>
                            <option value="in-progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="task-notes">Notes</label>
                    <textarea id="task-notes" rows="3" placeholder="Additional details..."></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="task-recurring">
                        Recurring Task (Weekly)
                    </label>
                </div>

                <div class="modal-actions">
                    <button type="button" id="delete-task-btn" class="danger-btn hidden">Delete</button>
                    <div class="spacer"></div>
                    <button type="button" id="cancel-btn" class="secondary-btn">Cancel</button>
                    <button type="submit" class="primary-btn">Save Task</button>
                </div>
            </form>
        </div>
    </dialog>
    <div id="theme-menu" class="theme-menu hidden">
        <button data-theme="normal">☀️ Normal</button>
        <button data-theme="dark">🌙 Dark</button>
        <button data-theme="light">✨ Light</button>
        <button data-theme="glass">💎 Glass</button>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>
</html>
