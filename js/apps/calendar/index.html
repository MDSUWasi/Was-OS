<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasCalendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-normal">
    <div id="app" class="app-wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📅</span>
                    <h1>WasCalendar</h1>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="month"><span class="nav-icon">📆</span><span>Month</span></button>
                <button class="nav-item" data-view="week"><span class="nav-icon">📅</span><span>Week</span></button>
                <button class="nav-item" data-view="day"><span class="nav-icon">🕒</span><span>Day</span></button>
                <button class="nav-item" data-view="year"><span class="nav-icon">🗓️</span><span>Year</span></button>
            </nav>

            <div class="sidebar-section">
                <h3>Categories</h3>
                <div class="category-list">
                    <button class="category-btn active" data-category="all">All</button>
                    <button class="category-btn" data-category="work">💼 Work</button>
                    <button class="category-btn" data-category="personal">👤 Personal</button>
                    <button class="category-btn" data-category="health">💪 Health</button>
                    <button class="category-btn" data-category="social">🎉 Social</button>
                    <button class="category-btn" data-category="study">📚 Study</button>
                </div>
            </div>

            <div class="sidebar-stats">
                <h3>This Month</h3>
                <div class="stat-row"><span>Total:</span><span id="month-count">0</span></div>
                <div class="stat-row"><span>Upcoming:</span><span id="upcoming-count">0</span></div>
            </div>

            <div class="sidebar-footer">
                <button id="theme-toggle" class="icon-btn" title="Theme">🌙</button>
                <button id="export-btn" class="icon-btn" title="Export">📤</button>
                <button id="import-btn" class="icon-btn" title="Import">📥</button>
                <input type="file" id="import-file" accept=".ics" style="display:none">
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="date-navigator">
                    <button id="prev-btn" class="icon-btn-small">◀</button>
                    <h2 id="current-period">September 2025</h2>
                    <button id="next-btn" class="icon-btn-small">▶</button>
                    <button id="today-btn" class="secondary-btn">Today</button>
                </div>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search events...">
                    <span class="search-icon">🔍</span>
                </div>
                <button id="add-event-btn" class="primary-btn"><span>+</span><span>New Event</span></button>
            </header>

            <section id="month-view" class="calendar-view active">
                <div class="calendar-grid">
                    <div class="weekday-header">
                        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                    <div id="month-days" class="days-grid"></div>
                </div>
            </section>

            <section id="week-view" class="calendar-view">
                <div class="week-grid">
                    <div class="time-sidebar">
                    </div>
                    <div id="week-columns" class="week-columns"></div>
                </div>
            </section>
            <section id="day-view" class="calendar-view">
                <div class="day-grid">
                    <div class="time-sidebar" id="day-time-sidebar">
                    </div>
                    <div id="day-column" class="day-column"></div>
                </div>
            </section>
            <section id="year-view" class="calendar-view">
                <div id="year-grid" class="year-grid"></div>
            </section>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📅</div>
                <h2>No events found</h2>
                <p>Create your first event to get started!</p>
                <button id="empty-add-btn" class="primary-btn">Create Event</button>
            </div>
        </main>
    </div>
    <dialog id="event-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add New Event</h2>
                <button id="modal-close" class="close-btn">&times;</button>
            </div>
            <form id="event-form">
                <input type="hidden" id="event-id">
                
                <div class="form-group">
                    <label for="event-title">Title *</label>
                    <input type="text" id="event-title" required placeholder="e.g., Team Meeting">
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="event-start">Start</label>
                        <input type="datetime-local" id="event-start" required>
                    </div>
                    <div class="form-group half">
                        <label for="event-end">End</label>
                        <input type="datetime-local" id="event-end" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group half">
                        <label for="event-category">Category</label>
                        <select id="event-category">
                            <option value="work">💼 Work</option>
                            <option value="personal">👤 Personal</option>
                            <option value="health">💪 Health</option>
                            <option value="social">🎉 Social</option>
                            <option value="study">📚 Study</option>
                        </select>
                    </div>
                    <div class="form-group half">
                        <label for="event-color">Color</label>
                        <select id="event-color">
                            <option value="#3b82f6">Blue</option>
                            <option value="#10b981">Green</option>
                            <option value="#f59e0b">Orange</option>
                            <option value="#ef4444">Red</option>
                            <option value="#8b5cf6">Purple</option>
                            <option value="#ec4899">Pink</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="event-location">Location</label>
                    <input type="text" id="event-location" placeholder="Room A, Zoom Link, etc.">
                </div>

                <div class="form-group">
                    <label for="event-description">Description</label>
                    <textarea id="event-description" rows="3" placeholder="Details..."></textarea>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="event-recurring">
                        Recurring Event
                    </label>
                    <div id="recurring-options" class="hidden" style="margin-top: 10px; display: flex; gap: 10px;">
                        <select id="recurrence-pattern">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                        <input type="number" id="recurrence-end" min="1" max="100" value="10" style="width: 100px;" placeholder="Count">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="delete-event-btn" class="danger-btn hidden">Delete</button>
                    <div class="spacer"></div>
                    <button type="button" id="cancel-btn" class="secondary-btn">Cancel</button>
                    <button type="submit" class="primary-btn">Save Event</button>
                </div>
            </form>
        </div>
    </dialog>

    <div id="theme-menu" class="theme-menu hidden">
        <button data-theme="normal">☀️ Normal</button>
        <button data-theme="dark">🌙 Night</button>
        <button data-theme="light">✨ Light</button>
        <button data-theme="glass">💎 Glass</button>
    </div>
    <div id="toast-container" class="toast-container"></div>

    <script src="main.js"></script>
</body>
</html>
